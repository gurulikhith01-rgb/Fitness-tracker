<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Zenith | Nani</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="zenith-container">
        <aside class="sidebar no-print">
            <div class="sidebar-inner">
                <div class="brand-block">
                    <div class="orb-avatar">N</div>
                    <h2 class="user-id">U. GURU LIKHITH REDDY</h2>
                    <div class="status-indicator">● NEURAL CORE ACTIVE</div>
                </div>

                <div class="module-stack">
                    <div class="module glass alert-pulse">
                        <label class="section-tag">DIET PROTOCOL</label>
                        <div id="sidebar-next-meal" class="telemetry-value">Syncing...</div>
                    </div>

                    <div class="module glass">
                        <label class="section-tag">UPTIME</label>
                        <div id="real-time-clock" class="mono-data emerald">00:00:00</div>
                    </div>

                    <div class="module glass rules-module">
                        <label class="section-tag">EVOLUTION ARCHITECTURE</label>
                        <ul class="protocol-list">
                            <li><span>🚫</span> No Sweets (Permanent)</li>
                            <li><span>🥛</span> No Curd / Raw Curd</li>
                            <li><span>🚫</span> No Side-Planks</li>
                            <li><span>🏃</span> Treadmill Cardio Prime</li>
                        </ul>
                    </div>

                    <div class="engine-glass" id="engine-container">
                        <div class="scan-line"></div>
                        <label class="section-tag">ZENITH ENGINE</label>
                        <div id="stopwatch-text" class="timer-display blue">00:00:00</div>
                        <div id="engine-status" class="engine-subtext">SYSTEM STANDBY</div>
                    </div>
                </div>

                <div class="sidebar-footer">
                    <button id="main-archive-print" class="btn-command primary">
                        <span class="btn-content">🖨️ EXPORT FULL ARCHIVE</span>
                    </button>
                    <button id="reset-btn" class="btn-command danger" onclick="if(confirm('Wipe Neural Core History?')) db.ref(USER_KEY).remove()">
                        <span class="btn-content">⚠️ WIPE NEURAL CORE</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="dashboard-portal">
            <header class="hub-header no-print">
                <div class="header-left">
                    <h1 class="portal-heading">Evolution Hub</h1>
                    <div class="telemetry-bar">
                        <span id="hub-day-name" class="day-label">...</span>
                        <span class="sep">/</span>
                        <span id="hub-full-date" class="date-label">...</span>
                        <span id="days-left-tag" class="countdown-badge-extreme">... DAYS LEFT</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="efficiency-container">
                        <div class="efficiency-meta">PROTOCOL EFFICIENCY: <span id="pct-text">0%</span></div>
                        <div class="progress-rail-extreme"><div id="progress-fill"></div></div>
                    </div>
                </div>
            </header>
            <div id="workout-grid" class="rigid-grid"></div>
        </main>
    </div>
    <canvas id="victory-canvas" class="no-print"></canvas>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
