<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Day Elite | Nani</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="trophy-overlay" class="trophy-hidden">
        <div class="trophy-card">
            <div class="trophy-icon">🏆</div>
            <h1>CHAMPION STATUS</h1>
            <p>30 Days of Absolute Discipline. Great work, Nani!</p>
            <button onclick="closeTrophy()">CONTINUE</button>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">N</div>
                <div class="brand-text">
                    <div class="u-name">U.Guru Likhith Reddy</div>
                    <div class="u-badge">ELITE PROTOCOL</div>
                </div>
            </div>

            <div class="side-item">
                <label>LIVE SESSION</label>
                <div id="stopwatch-text" class="timer-display">00:00:00</div>
                <button onclick="toggleGymSession()" id="session-btn" class="btn-blue">START SESSION</button>
            </div>

            <div class="side-item">
                <label>RECOVERY MONITOR</label>
                <div class="time-row">
                    <input type="time" id="bed-time" onchange="calculateSleep()">
                    <input type="time" id="wake-time" onchange="calculateSleep()">
                </div>
                <div class="sleep-stat" id="sleep-result">0h 0m</div>
                <div class="stars" id="star-container">
                    <span onclick="setStars(1)">☆</span><span onclick="setStars(2)">☆</span><span onclick="setStars(3)">☆</span><span onclick="setStars(4)">☆</span><span onclick="setStars(5)">☆</span>
                </div>
                <button onclick="saveSleepToCloud()" class="btn-ghost">LOG RECOVERY</button>
            </div>

            <div class="side-item rules">
                <label>STRICT RULES</label>
                <div class="rule-box">🚫 No Sugar</div>
                <div class="rule-box">🥛 No Raw Curd</div>
                <div class="rule-box">🛑 No Side Planks</div>
            </div>

            <button id="reset-btn" class="btn-danger">RESET CLOUD DATA</button>
        </aside>

        <main class="dashboard">
            <header class="top-nav">
                <div>
                    <h1>Active Evolution</h1>
                    <p id="header-date">...</p>
                </div>
                <div class="prog-wrapper">
                    <div class="prog-label">Completion: <span id="pct-text">0%</span></div>
                    <div class="bar-bg"><div id="progress-fill"></div></div>
                </div>
            </header>

            <div id="workout-grid" class="workout-grid"></div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
