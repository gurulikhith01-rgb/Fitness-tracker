<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Day Pro | U.Guru Likhith Reddy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body id="app-body">
    <div class="dashboard-wrapper">
        <aside class="sidebar no-print">
            <div class="user-profile">
                <h1 class="user-name">U.Guru Likhith Reddy</h1>
                <p class="subtitle">30-Day Fat Burn Challenge</p>
            </div>

            <div class="session-widget">
                <div class="session-label" id="session-status">OFF-DUTY</div>
                <div class="timer-display" id="stopwatch-text">00:00:00</div>
                <div class="timer-controls">
                    <button onclick="toggleGymSession()" id="session-btn" class="start-btn">START SESSION</button>
                    <button onclick="resetStopwatch()" class="reset-btn">RESET TIMER</button>
                </div>
            </div>

            <div class="streak-widget">
                <span class="streak-icon">🔥</span>
                <div class="streak-info">
                    <strong id="streak-count">0</strong>
                    <span>Discipline Streak</span>
                </div>
            </div>

            <div class="progress-widget">
                <div class="widget-header">
                    <span>Overall Progress</span>
                    <span id="pct-text">0%</span>
                </div>
                <div class="progress-track"><div id="progress-fill"></div></div>
            </div>

            <button onclick="toggleGymMode()" class="gym-toggle-btn">🏃 GYM MODE (ZOOM)</button>
            <button id="reset-btn">Reset Cloud Data</button>
        </aside>

        <main class="content-body">
            <header class="main-header">
                <div>
                    <h2 style="margin:0">Activity & Nutrition Log</h2>
                    <div class="current-status">Today: <strong id="header-date">...</strong></div>
                </div>
                <button onclick="window.print()" class="no-print print-btn">🖨️ Print Dashboard</button>
            </header>
            <div id="workout-grid" class="workout-grid"></div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
